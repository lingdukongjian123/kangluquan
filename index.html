<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>康鲁泉净水器维修管理系统</title>
    <script src="https://lib.baomitu.com/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://lib.baomitu.com/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://lib.baomitu.com/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f9fafb; }
        #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: white; z-index: 9999; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading"><div class="text-center"><div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div><p class="text-gray-500 font-bold">系统加载中...</p></div></div>
    <div id="root"></div>
    <script>
        window.onload = () => { const loader = document.getElementById('loading'); if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 500); } };
        const { useState, useEffect, useMemo } = React;
        const STORAGE_KEY = 'kangluquan_data';
        const App = () => {
            const [machines, setMachines] = useState(() => JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
            const [modal, setModal] = useState(null);
            useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(machines)); lucide.createIcons(); }, [machines, modal]);
            return React.createElement('div', { className: 'p-4' }, 
                React.createElement('div', { className: 'flex justify-between items-center mb-6' },
                    React.createElement('h1', { className: 'text-2xl font-black text-blue-600' }, '康鲁泉管理系统'),
                    React.createElement('button', { onClick: () => {
                        const id = prompt('请输入设备编号:');
                        const comm = prompt('请输入小区名称:');
                        if(id && comm) setMachines([...machines, { id, community: comm, status: 'normal' }]);
                    }, className: 'bg-blue-600 text-white px-4 py-2 rounded-xl font-bold' }, '+ 新增')
                ),
                machines.length === 0 ? React.createElement('p', { className: 'text-center text-gray-400 py-20' }, '暂无设备，请点击右上角新增') :
                machines.map(m => React.createElement('div', { key: m.id, className: 'bg-white p-4 rounded-2xl shadow-sm border mb-4' },
                    React.createElement('div', { className: 'flex justify-between' },
                        React.createElement('div', null, React.createElement('h3', { className: 'font-bold' }, m.id), React.createElement('p', { className: 'text-sm text-gray-500' }, m.community)),
                        React.createElement('span', { className: `text-xs px-2 py-1 rounded ${m.status === 'normal' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}` }, m.status === 'normal' ? '正常' : '故障')
                    )
                ))
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
