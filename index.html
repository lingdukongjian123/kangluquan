<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>康鲁泉净水器维修管理系统 - 联网专业版</title>
    <script src="https://lib.baomitu.com/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://lib.baomitu.com/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://lib.baomitu.com/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f9fafb; }
        #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: white; z-index: 9999; transition: opacity 0.5s; }
        .animate-spin { animation: spin 1s linear infinite; width: 40px; height: 40px; border: 4px solid #2563eb; border-top-color: transparent; border-radius: 50%; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading"><div style="text-align: center;"><div class="animate-spin"></div><p style="margin-top: 10px; color: #666; font-weight: bold;">系统同步中...</p></div></div>
    <div id="root"></div>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyASiJ4T__0QN3R-rKfcSRrzjSv8gMx8m44",
          authDomain: "gen-lang-client-0025058783.firebaseapp.com",
          projectId: "gen-lang-client-0025058783",
          appId: "1:490143325908:web:8a1ee22a674468460b6541",
          firestoreDatabaseId: "ai-studio-da318c6a-f9cc-45cf-bfab-ff633f4bdb08"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore(firebase.app(), firebaseConfig.firestoreDatabaseId);
        const { useState, useEffect, useMemo } = React;
        function App() {
            const [user, setUser] = useState(null);
            const [machines, setMachines] = useState([]);
            const [loading, setLoading] = useState(true);
            const [modal, setModal] = useState(null);
            const [selected, setSelected] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            useEffect(() => {
                return auth.onAuthStateChanged(u => {
                    setUser(u); setLoading(false);
                    const loader = document.getElementById('loading');
                    if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 500); }
                });
            }, []);
            useEffect(() => {
                if (!user) return;
                return db.collection('machines').onSnapshot(s => {
                    setMachines(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    if(window.lucide) lucide.createIcons();
                });
            }, [user]);
            const login = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
            const filtered = machines.filter(m => m.id.includes(searchTerm) || m.community.includes(searchTerm));
            if (loading) return null;
            if (!user) return React.createElement('div', { className: 'h-screen flex items-center justify-center bg-blue-600 p-6' }, 
                React.createElement('div', { className: 'bg-white p-8 rounded-3xl text-center space-y-6 w-full max-w-sm' },
                    React.createElement('h1', { className: 'text-2xl font-black' }, '康鲁泉管理系统'),
                    React.createElement('button', { onClick: login, className: 'w-full py-4 bg-blue-600 text-white rounded-2xl font-bold' }, '点击登录使用')
                )
            );
            return React.createElement('div', { className: 'pb-20' },
                React.createElement('header', { className: 'bg-white p-4 border-b sticky top-0 flex justify-between items-center' },
                    React.createElement('h1', { className: 'font-black text-blue-600' }, '康鲁泉管理系统'),
                    React.createElement('button', { onClick: () => {
                        const id = prompt('设备编号:'); const comm = prompt('所属小区:');
                        if(id && comm) db.collection('machines').doc(id).set({ id, community: comm, status: 'normal' });
                    }, className: 'bg-blue-600 text-white p-2 rounded-lg' }, '+')
                ),
                React.createElement('div', { className: 'p-4' }, 
                    React.createElement('input', { placeholder: '搜索...', className: 'w-full p-3 border rounded-xl mb-4', onChange: e => setSearchTerm(e.target.value) }),
                    filtered.map(m => React.createElement('div', { key: m.id, className: 'bg-white p-4 rounded-2xl border mb-4 shadow-sm' },
                        React.createElement('div', { className: 'flex justify-between mb-4' },
                            React.createElement('div', null, React.createElement('h3', { className: 'font-bold' }, m.id), React.createElement('p', { className: 'text-xs text-gray-400' }, m.community)),
                            React.createElement('span', { className: `text-[10px] px-2 py-1 rounded ${m.status === 'normal' ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}` }, m.status === 'normal' ? '正常' : '故障')
                        ),
                        React.createElement('button', { 
                            onClick: () => db.collection('machines').doc(m.id).update({ status: m.status === 'normal' ? 'fault' : 'normal' }),
                            className: `w-full py-2 rounded-xl text-xs font-bold ${m.status === 'normal' ? 'bg-red-50 text-red-600' : 'bg-green-600 text-white'}`
                        }, m.status === 'normal' ? '报修' : '完成维修')
                    ))
                )
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
