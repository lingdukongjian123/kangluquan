<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>康鲁泉管理系统 - 联网专业版</title>
    <!-- 国内加速库 -->
    <script src="https://cdn.staticfile.org/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.staticfile.org/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.staticfile.org/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.js"></script>
    <!-- Firebase 联网库 -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f9fafb; margin: 0; }
        #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: white; z-index: 9999; transition: opacity 0.5s; }
        .animate-spin { animation: spin 1s linear infinite; width: 40px; height: 40px; border: 4px solid #2563eb; border-top-color: transparent; border-radius: 50%; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="loading"><div style="text-align: center;"><div class="animate-spin"></div><p style="margin-top: 10px; color: #666; font-weight: bold;">云端同步中...</p></div></div>
    <div id="root"></div>

    <script>
        // 1. 云端配置
        const firebaseConfig = {
          apiKey: "AIzaSyASiJ4T__0QN3R-rKfcSRrzjSv8gMx8m44",
          authDomain: "gen-lang-client-0025058783.firebaseapp.com",
          projectId: "gen-lang-client-0025058783",
          appId: "1:490143325908:web:8a1ee22a674468460b6541",
          firestoreDatabaseId: "ai-studio-da318c6a-f9cc-45cf-bfab-ff633f4bdb08"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore(firebase.app(), firebaseConfig.firestoreDatabaseId);

        const { useState, useEffect, useMemo } = React;

        // 设置一个初始系统密码
        const SYSTEM_PASSWORD = "888"; 

        function App() {
            const [user, setUser] = useState(null);
            const [machines, setMachines] = useState([]);
            const [loading, setLoading] = useState(true);
            const [password, setPassword] = useState('');
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                return auth.onAuthStateChanged(u => {
                    setUser(u); setLoading(false);
                    const loader = document.getElementById('loading');
                    if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 500); }
                });
            }, []);

            useEffect(() => {
                if (!user) return;
                return db.collection('machines').onSnapshot(s => {
                    setMachines(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    if(window.lucide) lucide.createIcons();
                });
            }, [user]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === SYSTEM_PASSWORD) {
                    // 使用匿名登录，绕过域名限制
                    auth.signInAnonymously().catch(err => alert("登录失败: " + err.message));
                } else {
                    alert("密码错误，请输入正确的系统密码");
                }
            };

            const filtered = machines.filter(m => m.id.includes(searchTerm) || m.community.includes(searchTerm));

            if (loading) return null;

            // 登录界面
            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-blue-600 p-6">
                    <div className="bg-white p-10 rounded-3xl text-center shadow-2xl w-full max-w-sm space-y-6">
                        <div className="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto">
                            <i data-lucide="lock" className="text-blue-600" size="32"></i>
                        </div>
                        <div>
                            <h1 className="text-2xl font-black text-gray-800">康鲁泉管理系统</h1>
                            <p className="text-gray-400 font-bold">联网专业版 · 内部使用</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input 
                                type="password" 
                                placeholder="请输入系统密码" 
                                className="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none focus:border-blue-500 text-center text-xl tracking-widest"
                                value={password}
                                onChange={e => setPassword(e.target.value)}
                            />
                            <button type="submit" className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg hover:bg-blue-700 transition-all">
                                进入系统
                            </button>
                        </form>
                        <p className="text-[10px] text-gray-300 uppercase font-bold">初始密码请询问管理员</p>
                    </div>
                </div>
            );

            // 主界面
            return (
                <div className="pb-20 max-w-md mx-auto">
                    <header className="bg-white p-4 border-b sticky top-0 flex justify-between items-center shadow-sm z-10">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-1.5 rounded-lg text-white">
                                <i data-lucide="wrench" size="16"></i>
                            </div>
                            <h1 className="font-black text-blue-600 text-lg">康鲁泉管理</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => {
                                const id = prompt('设备编号:'); const comm = prompt('所属小区:');
                                if(id && comm) db.collection('machines').doc(id).set({ id, community: comm, status: 'normal', date: new Date().toLocaleDateString() });
                            }} className="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm shadow-md">
                                + 新增
                            </button>
                            <button onClick={() => auth.signOut()} className="p-2 text-gray-300"><i data-lucide="log-out" size="18"></i></button>
                        </div>
                    </header>

                    <div className="p-4">
                        <div className="relative mb-6">
                            <i data-lucide="search" className="absolute left-4 top-3.5 text-gray-300" size="18"></i>
                            <input 
                                type="text" 
                                placeholder="搜索编号或小区..." 
                                className="w-full pl-12 pr-4 py-3 bg-white border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 shadow-sm"
                                onChange={e => setSearchTerm(e.target.value)}
                            />
                        </div>

                        <div className="space-y-4">
                            {filtered.length === 0 ? (
                                <div className="text-center py-20 text-gray-300 font-bold">暂无设备数据</div>
                            ) : filtered.map(m => (
                                <div key={m.id} className="bg-white p-5 rounded-3xl border-2 border-gray-50 shadow-sm hover:shadow-md transition-all">
                                    <div className="flex justify-between items-start mb-4">
                                        <div>
                                            <h3 className="font-black text-gray-800 text-xl">{m.id}</h3>
                                            <p className="text-xs text-gray-400 font-bold mt-1">{m.community}</p>
                                        </div>
                                        <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase ${m.status === 'normal' ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}`}>
                                            {m.status === 'normal' ? '● 运行中' : '● 故障'}
                                        </span>
                                    </div>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => db.collection('machines').doc(m.id).update({ status: m.status === 'normal' ? 'fault' : 'normal' })}
                                            className={`flex-1 py-3 rounded-2xl text-xs font-black transition-all ${m.status === 'normal' ? 'bg-red-50 text-red-600 hover:bg-red-100' : 'bg-green-600 text-white shadow-lg shadow-green-200'}`}
                                        >
                                            {m.status === 'normal' ? '报修' : '完成维修'}
                                        </button>
                                        <button 
                                            onClick={() => { if(confirm('确定删除？')) db.collection('machines').doc(m.id).delete(); }}
                                            className="px-4 py-3 bg-gray-50 text-gray-300 rounded-2xl hover:text-red-400 transition-colors"
                                        >
                                            <i data-lucide="trash-2" size="16"></i>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // 初始化图标
        setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 1000);

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
